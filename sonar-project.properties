# SonarCloud configuration for rogue-finder.
# Update sonar.projectKey to match the key assigned in SonarCloud when registering the repo.
sonar.host.url=https://sonarcloud.io
sonar.organization=unagi
sonar.projectKey=unagi_rogue-finder

# Source/test layout mirrors pytest + Poe tasks.
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.coverage.exclusions=**/nmap_gui/gui/view/**,**/nmap_gui/gui/controller/main_window_controller.py
sonar.issue.ignore.multicriteria=i18n_dup_literals
sonar.issue.ignore.multicriteria.i18n_dup_literals.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.i18n_dup_literals.resourceKey=src/nmap_gui/i18n/*.py

# Pull coverage from the XML file emitted by `poe test`.
sonar.python.coverage.reportPaths=coverage.xml
